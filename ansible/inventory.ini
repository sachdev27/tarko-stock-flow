[tarko_servers]
# Production server (existing)
production ansible_host=tarko-backend.tarko.in ansible_user=ubuntu ansible_port=22

# Staging server
staging ansible_host=192.168.29.112 ansible_user=divine ansible_port=22

# OCI Free Tier instance (ARM A1.Flex)
# Replace OCI_PUBLIC_IP with the IP from: terraform output instance_public_ip
oci ansible_host=OCI_PUBLIC_IP ansible_user=ubuntu ansible_port=22 ansible_ssh_private_key_file=~/.ssh/id_rsa

[local]
pi ansible_host=192.168.29.112 ansible_user=divine ansible_port=22
macmini ansible_host=192.168.29.111 ansible_user=diviine ansible_port=22

[tarko_servers:vars]
ansible_python_interpreter=/usr/bin/python3


; ansible-playbook -i ansible/inventory.ini  ansible/deploy.yml  -k --ask-become-pass --ask-vault-pass --limit staging
; OCI deployment (after terraform apply):
;   ansible-playbook -i ansible/inventory.ini ansible/deploy.yml --ask-vault-pass --limit oci