services:
  postgres:
    image: postgres:15-alpine
    container_name: tarko-postgres
    restart: unless-stopped
    cpus: "${POSTGRES_CPUS:-0.35}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    pids_limit: 100
    environment:
      POSTGRES_DB: tarko_inventory
      POSTGRES_USER: tarko_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarko_user -d tarko_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tarko-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tarko-backend
    restart: always
    cpus: "${BACKEND_CPUS:-0.65}"
    mem_limit: "${BACKEND_MEM_LIMIT:-448m}"
    mem_reservation: "${BACKEND_MEM_RESERVATION:-256m}"
    pids_limit: 200
    environment:
      DATABASE_URL: postgresql://tarko_user:${DB_PASSWORD:-changeme123}@${DB_HOST:-postgres}:${DB_PORT:-5432}/tarko_inventory
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      SNAPSHOT_STORAGE_PATH: /app/snapshots
      UPLOAD_STORAGE_PATH: /app/uploads
      BACKUP_RETENTION_DAYS: 30
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP_URL: ${APP_URL:-https://tarko-inv.web.app}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./snapshots:/app/snapshots
      - ./backups:/backups
    ports:
      - "5500:5500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tarko-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5500/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

