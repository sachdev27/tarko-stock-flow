services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tarko-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://tarko_user:${DB_PASSWORD:-changeme123}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/tarko_inventory
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      SNAPSHOT_STORAGE_PATH: /app/snapshots
      UPLOAD_STORAGE_PATH: /app/uploads
      BACKUP_RETENTION_DAYS: 30
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP_URL: ${APP_URL:-https://tarko-inv.web.app}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./snapshots:/app/snapshots
      - ./backups:/backups
    ports:
      - "5500:5500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tarko-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5500/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tarko-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:5500}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tarko-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tarko-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - backend
    networks:
      - tarko-network

volumes:
  postgres_data:
    driver: local

networks:
  tarko-network:
    driver: bridge
